<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow:hidden}
  .stage{position:relative;overflow:hidden;color:#fff;font-family:"Inter",sans-serif}
  .stage img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,30,16,.55) 0%,rgba(8,30,16,0) 30%,rgba(8,30,16,.30) 55%,rgba(8,30,16,.92) 100%)}
  .logo{position:absolute;top:6%;left:7%;z-index:3}
  .logo img{height:64px;filter:brightness(0) invert(1)}
  .content{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:7%}
  .eyebrow{text-transform:uppercase;letter-spacing:.2em;font-weight:700;opacity:.92;font-size:26px;margin-bottom:18px}
  .headline{font-family:"Fraunces",serif;font-weight:700;line-height:1.02;font-size:96px;text-shadow:0 3px 24px rgba(0,0,0,.35)}
  .sub{font-weight:600;font-size:36px;margin-top:18px;opacity:.96}
  .pricerow{display:flex;align-items:center;gap:24px;margin-top:34px;flex-wrap:wrap}
  .price{font-family:"Fraunces",serif;font-weight:700;font-size:84px;background:#1f7a3d;padding:6px 28px;border-radius:18px;line-height:1.1}
  .fin{font-weight:600;font-size:30px;opacity:.95}
  .cta{margin-top:34px;display:inline-flex;align-items:center;gap:16px;background:#fff;color:#0f5128;font-weight:800;
       font-size:42px;padding:22px 40px;border-radius:999px}
  .cta .dot{width:18px;height:18px;border-radius:50%;background:#1f7a3d}
  .staged-note{position:absolute;left:7%;bottom:3%;font-size:20px;opacity:.7;z-index:3}

  /* formats */
  [data-f="og"] .stage{width:1200px;height:630px}
  [data-f="og"] .headline{font-size:72px}
  [data-f="og"] .sub{font-size:30px}
  [data-f="og"] .price{font-size:58px}
  [data-f="og"] .fin{font-size:24px}
  [data-f="og"] .cta{font-size:32px;padding:16px 30px}
  [data-f="og"] .logo img{height:48px}
  [data-f="og"] .eyebrow{font-size:20px;margin-bottom:12px}

  [data-f="sq"] .stage{width:1080px;height:1080px}
  [data-f="portrait"] .stage{width:1080px;height:1350px}
  [data-f="story"] .stage{width:1080px;height:1920px}
  [data-f="story"] .content{bottom:8%}
  [data-f="story"] .headline{font-size:104px}
  [data-f="pin"] .stage{width:1000px;height:1500px}
</style>
</head>
<body>
<div class="stage">
  <img class="bg" src="../assets/photos/01-Exterior-Front-Hero.webp" alt="" />
  <div class="scrim"></div>
  <div class="logo"><img src="../assets/img/logo.webp" alt="Elegment Land" /></div>
  <div class="content">
    <div class="eyebrow">New Construction &middot; For Sale</div>
    <div class="headline">Brand-New<br/>3BR Home</div>
    <div class="sub">0.83 Acres &nbsp;&bull;&nbsp; Mexia, TX &nbsp;&bull;&nbsp; No HOA</div>
    <div class="pricerow">
      <span class="price">$149,900</span>
      <span class="fin">Financing: FHA &middot; VA &middot; USDA</span>
    </div>
    <div class="cta"><span class="dot"></span> Call / Text 970-420-2440</div>
  </div>
</div>
<script>
  var f = (new URLSearchParams(location.search)).get('f') || 'og';
  document.body.setAttribute('data-f', f);
</script>
</body>
</html>
